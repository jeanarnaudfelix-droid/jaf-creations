<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>JAF Créations</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: #0d0d0d;
    color: white;
}

header {
    text-align: center;
    padding: 50px 20px;
    font-size: 32px;
    letter-spacing: 3px;
}

.sub {
    text-align: center;
    color: #aaa;
    margin-bottom: 40px;
}

.container {
    display: grid;
    gap: 30px;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    border-radius: 16px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

.card img {
    width: 100%;
}

.card h2 {
    padding: 15px;
    font-size: 20px;
}

.card p {
    padding: 0 15px 15px;
    color: #bbb;
}

.card a {
    display: block;
    text-align: center;
    padding: 15px;
    background: white;
    color: black;
    text-decoration: none;
    font-weight: bold;
}

footer {
    text-align: center;
    padding: 40px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<header>JAF Créations</header>
<div class="sub">Sélection de pièces uniques</div>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/800">
<h2>Sac cuir artisanal</h2>
<p>Pièce unique — fabrication haut de gamme</p>
<a href="#">Voir sur eBay</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/800">
<h2>Bague argent brut</h2>
<p>Design organique — fait main</p>
<a href="#">Voir sur eBay</a>
</div>

</div>

<footer>
© JAF Créations
</footer>

</body>
</html>
