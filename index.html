<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>JAF Créations</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: #0d0d0d;
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
}

.logo {
    width: 120px;
    margin-bottom: 15px;
    opacity: 0.9;
}

h1 {
    letter-spacing: 4px;
    margin: 10px 0;
}

.subtitle {
    color: #aaa;
}

.container {
    padding: 20px;
}

.product {
    background: #1a1a1a;
    border-radius: 20px;
    margin-bottom: 30px;
    overflow: hidden;
}

.gallery {
    display: flex;
    overflow-x: auto;
}

.gallery img {
    width: 100%;
    max-width: 300px;
    margin-right: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.product-info {
    padding: 20px;
}

.button {
    display: block;
    text-align: center;
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
    text-decoration: none;
    font-weight: bold;
}

footer {
    text-align: center;
    padding: 30px;
    color: #777;
}

/* ZOOM */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
}

.modal img {
    display: block;
    margin: auto;
    max-width: 90%;
    max-height: 90%;
}

</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <h1>JAF Créations</h1>
    <div class="subtitle">Sélection de pièces uniques</div>
</header>

<div class="container">

<!-- BAGUE 1 -->
<div class="product">
    <div class="gallery">
        <img src="IMG_9836.JPG" onclick="openModal(this)">
        <img src="IMG_9837.JPG" onclick="openModal(this)">
        <img src="IMG_9838.JPG" onclick="openModal(this)">
        <img src="IMG_9842.JPG" onclick="openModal(this)">
    </div>
    <div class="product-info">
        <h2>Bague Rosa Maria</h2>
        <p>Garnet facetté & pavé émeraude</p>
        <a href="#" class="button">Voir sur eBay</a>
    </div>
</div>

<!-- BAGUE 2 -->
<div class="product">
    <div class="gallery">
        <img src="IMG_9843.JPG" onclick="openModal(this)">
        <img src="IMG_9844.JPG" onclick="openModal(this)">
        <img src="IMG_9845.JPG" onclick="openModal(this)">
        <img src="IMG_9847.JPG" onclick="openModal(this)">
    </div>
    <div class="product-info">
        <h2>Bague Argent Brut</h2>
        <p>Design organique — fait main</p>
        <a href="#" class="button">Voir sur eBay</a>
    </div>
</div>

</div>

<footer>
© JAF Créations
</footer>

<!-- MODAL ZOOM -->
<div id="modal" class="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>
function openModal(img) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("modalImg").src = img.src;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
