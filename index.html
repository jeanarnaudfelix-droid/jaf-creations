<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>JAF Créations</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: #0d0d0d;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 40px 20px;
}

.logo {
    width: 120px;
    margin-bottom: 20px;
}

h1 {
    font-weight: 300;
    letter-spacing: 4px;
}

.subtitle {
    color: #aaa;
}

/* GRID PRODUITS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
}

/* IMAGES */
.card img {
    width: 100%;
    cursor: pointer;
    transition: 0.3s;
}

.card img:hover {
    opacity: 0.8;
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
}
</style>
</head>

<body>

<header>
    <!-- ⚠️ ADAPTE ICI -->
    <img src="Logo.png" class="logo">

    <h1>JAF Créations</h1>
    <div class="subtitle">Sélection de pièces uniques</div>
</header>

<div class="grid">

    <!-- BAGUE 1 -->
    <div class="card">
        <img src="IMG_9836.JPG" onclick="openImg(this.src)">
        <img src="IMG_9837.JPG" onclick="openImg(this.src)">
        <img src="IMG_9838.JPG" onclick="openImg(this.src)">
        <img src="IMG_9842.JPG" onclick="openImg(this.src)">
    </div>

    <!-- BAGUE 2 -->
    <div class="card">
        <img src="IMG_9843.JPG" onclick="openImg(this.src)">
        <img src="IMG_9844.JPG" onclick="openImg(this.src)">
        <img src="IMG_9845.JPG" onclick="openImg(this.src)">
        <img src="IMG_9847.JPG" onclick="openImg(this.src)">
    </div>

    <!-- TU DUPLIQUES POUR CHAQUE BAGUE -->

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
    <img id="lightbox-img">
</div>

<script>
function openImg(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}

function closeImg() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
