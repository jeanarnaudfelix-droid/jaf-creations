<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAF Créations</title>

<style>
body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: #0d0d0d;
    color: white;
}

header {
    text-align: center;
    padding: 40px;
}

h1 {
    letter-spacing: 4px;
    font-weight: 300;
}

.container {
    padding: 20px;
}

.product {
    margin-bottom: 50px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
}

/* ZOOM */
#overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#overlay img {
    max-width:90%;
    max-height:90%;
}

.price {
    color:#d5b06a;
    margin-top:10px;
}
</style>

</head>

<body>

<header>
<h1>JAF CRÉATIONS</h1>
<div>Sélection de pièces uniques</div>
</header>

<div class="container">

<!-- BAGUE 1 -->
<div class="product">
<h3>Grenat & émeraudes</h3>
<div class="gallery">

<img src="IMG_9853.JPG" onclick="zoom(this)">
<img src="IMG_9854.JPG" onclick="zoom(this)">
</div>
<div class="price">1’670 CHF</div>
</div>

<img src="IMG_9847.JPG" onclick="zoom(this)">

<img src="IMG_9861.JPG" onclick="zoom(this)">

</div>

<!-- OVERLAY -->
<div id="overlay" onclick="this.style.display='none'">
<img id="zoomed">
</div>

<script>
function zoom(img){
    document.getElementById("overlay").style.display="flex";
    document.getElementById("zoomed").src = img.src;
}
</script>

</body>
</html>
